<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Syne+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="artstyle.css">
    <title>Art Gallery</title>
</head>

<body>
    <div class="home-page">
        <div class="home-here">
            <div class="back-img">
                <img id="background" src="galleryImages/firstimg.jfif" alt="Background Image">
            </div>
            <div class="content">
                <h2 id="welcome">Welcome to my</h2>
                <h1 id="art">Art Gallery</h1>
            </div>
        </div>
    </div>
    <div class="img-head">Present Work</div>
    <div id="wrapper">
        <div class="container">
            <div class="gallery"> 
                <figure class="card">
                    <img src="galleryImages/lady_painting.jpg" alt="" id="image1" class="art_images">
                    <img src="galleryImages/vintage.jpg" alt="" id="image2" class="art_images">
                    <img src="galleryImages/music.jpeg" alt="" id="image3" class="art_images">
                </figure>
        
                <figure class="card">
                    <img src="galleryImages/forest_fire.jpeg" alt="" id="image4" class="art_images">
                    <img src="galleryImages/art4.png" alt="" id="image5" class="art_images">
                    <img src="galleryImages/art5.png" alt="" id="image6" class="art_images">
                </figure>
                <div class="artGallery">Past Work</div>
                <figure class="card">
                    <img src="galleryImages/lady_painting.jpg" alt="" id="image1" class="art_images">
                    <img src="galleryImages/vintage.jpg" alt="" id="image2" class="art_images">
                    <img src="galleryImages/music.jpeg" alt="" id="image3" class="art_images">
                </figure>
        
                <figure class="card">
                    <img src="galleryImages/forest_fire.jpeg" alt="" id="image4" class="art_images">
                    <img src="galleryImages/art4.png" alt="" id="image5" class="art_images">
                    <img src="galleryImages/art5.png" alt="" id="image6" class="art_images">
                </figure>
            </div>
        </div>
    </div>
    
    <div class="copyright">
        Copyright @Harshita Shekhawat. Made with <i class="fa-sharp fa-solid fa-heart"></i>
    </div>
</body>

</html>
